<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container my-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Task List</h1>

        <button class="btn btn-primary">
            <i class="bi bi-plus-lg"></i>
            Add Task
        </button>
    </div>

    <!-- Task List -->
    <div class="card p-3 mb-3">
        <div class="row align-items-center">

            <div class="col-md-4">
                <small class="text-muted">Task</small>
                <p class="mb-0">Go to gym</p>
            </div>

            <div class="col-md-2">
                <small class="text-muted">Priority</small>
                <p class="text-danger fw-bold mb-0">High</p>
            </div>

            <div class="col-md-2">
                <span class="badge bg-secondary">To Do</span>
            </div>

            <div class="col-md-1">
                <input type="radio" class="form-check-input">
            </div>

            <div class="col-md-1">
                <button class="btn btn-light">
                    <i class="bi bi-pencil-square"></i>
                </button>
            </div>

            <div class="col-md-1">
                <button class="btn btn-light text-danger">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        </div>
    </div>

    <div class="card p-3 mb-3">
        <div class="row align-items-center">

            <div class="col-md-4">
                <small class="text-muted">Task</small>
                <p class="mb-0">Read a book</p>
            </div>

            <div class="col-md-2">
                <small class="text-muted">Priority</small>
                <p class="text-success fw-bold mb-0">Low</p>
            </div>

            <div class="col-md-2">
                <span class="badge bg-secondary">Done</span>
            </div>

            <div class="col-md-1">
                <input type="radio" class="form-check-input" checked>
            </div>

            <div class="col-md-1">
                <button class="btn btn-light">
                    <i class="bi bi-pencil-square"></i>
                </button>
            </div>

            <div class="col-md-1">
                <button class="btn btn-light text-danger">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        </div>
    </div>

    <div class="card p-3 mb-4">
        <div class="row align-items-center">

            <div class="col-md-4">
                <small class="text-muted">Task</small>
                <p class="mb-0">Go to market</p>
            </div>

            <div class="col-md-2">
                <small class="text-muted">Priority</small>
                <p class="text-warning fw-bold mb-0">Medium</p>
            </div>

            <div class="col-md-2">
                <span class="badge bg-secondary">In Progress</span>
            </div>

            <div class="col-md-1">
                <input type="radio" class="form-check-input">
            </div>

            <div class="col-md-1">
                <button class="btn btn-light">
                    <i class="bi bi-pencil-square"></i>
                </button>
            </div>

            <div class="col-md-1">
                <button class="btn btn-light text-danger">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        </div>
    </div>

    <!-- Add Task Form -->
    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Add Task</h4>

            <button class="btn-close"></button>
        </div>

        <div class="card-body">

            <!-- Task Name -->
            <div class="mb-4">
                <label class="form-label">Task</label>
                <input
                    type="text"
                    class="form-control"
                    placeholder="Type your task here..."
                >
            </div>

            <!-- Priority -->
            <div class="mb-4">
                <label class="form-label d-block">Priority</label>

                <input type="radio" class="btn-check" name="priority" id="high">
                <label class="btn btn-outline-danger me-2" for="high">
                    High
                </label>

                <input type="radio" class="btn-check" name="priority" id="medium">
                <label class="btn btn-outline-warning me-2" for="medium">
                    Medium
                </label>

                <input type="radio" class="btn-check" name="priority" id="low">
                <label class="btn btn-success" for="low">
                    Low
                </label>
            </div>

            <!-- Submit -->
            <div class="text-end">
                <button class="btn btn-secondary">
                    Add
                </button>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
